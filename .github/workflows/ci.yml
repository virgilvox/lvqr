name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Format and Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      # Ubuntu-latest GitHub-hosted runners ship with ~14 GB free + ~30 GB
      # of preinstalled tooling (Android SDK, .NET, Haskell, CodeQL,
      # preloaded Docker images, swap) that LVQR doesn't use. The full
      # workspace `cargo build` + `cargo test` + the rust-cache restore
      # routinely pushes past that ceiling and crashes the runner with
      # `IOException: No space left on device` mid-test.
      #
      # We tried `jlumbroso/free-disk-space@main` first; on the current
      # ubuntu-24.04 image it only reclaimed ~1.8 GB (apt-get removes of
      # packages that are no longer installed are silent no-ops, and the
      # action's hard-coded directory list has drifted). Doing it inline
      # is more reliable and cheaper -- ~5 s vs the action's ~3 min.
      - name: Free disk space (Linux only)
        if: runner.os == 'Linux'
        run: |
          set -e
          echo "Before:"; df -h /
          # Pre-installed toolchains LVQR does not use. Each path is
          # tested with `[ -d ]` so the script does not error if the
          # runner image moves them.
          for p in \
              /usr/local/lib/android \
              /usr/share/dotnet \
              /usr/share/swift \
              /opt/ghc /usr/local/.ghcup \
              /opt/hostedtoolcache/CodeQL \
              /opt/hostedtoolcache/PyPy \
              /opt/hostedtoolcache/Ruby \
              /opt/hostedtoolcache/go \
              /usr/local/share/powershell \
              /usr/local/share/chromium \
              /usr/local/share/boost \
              /opt/microsoft \
              /opt/google; do
            if [ -d "$p" ]; then
              echo "Removing $p"
              sudo rm -rf "$p" || true
            fi
          done
          # Preinstalled Docker images we won't use (the docker job
          # builds its own image; the test job doesn't run Docker at
          # all). Best-effort.
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          # Disable swap to release the swapfile (~4 GB on /).
          sudo swapoff -a 2>/dev/null || true
          sudo rm -f /mnt/swapfile /swapfile 2>/dev/null || true
          echo "After:"; df -h /
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # ffmpeg is required so the conformance test helper in
      # lvqr-test-utils (ffprobe_bytes) validates generated fMP4 output
      # against a real external validator instead of soft-skipping.
      - name: Install ffmpeg (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install ffmpeg (macos)
        if: runner.os == 'macOS'
        run: brew install ffmpeg
      - name: Verify ffprobe is on PATH
        run: ffprobe -version | head -n 1
      - name: Build
        run: cargo build --workspace
      - name: Test (lib + integration + doc)
        run: cargo test --workspace

  # Tier 4 item 4.1 session A2: exercise the tokio-uring write path in
  # lvqr-archive's `io-uring` feature. Linux-only (tokio-uring only compiles
  # on `target_os = "linux"`) and isolated to its own job rather than a
  # matrix cell on `test` so macOS CI time does not grow.
  archive-io-uring:
    name: Archive (io-uring feature, Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: archive-io-uring-v1
      - name: Clippy (lvqr-archive, io-uring feature)
        run: cargo clippy -p lvqr-archive --features io-uring --all-targets -- -D warnings
      - name: Test (lvqr-archive, io-uring feature)
        run: cargo test -p lvqr-archive --features io-uring

  # Tier 4 item 4.3 session A: exercise the `provenance::sign_asset_bytes`
  # primitive through the `c2pa` feature. Separate job so macOS CI time does
  # not grow by ~2 minutes per build (c2pa-rs pulls a sizable transitive
  # closure for COSE + JUMBF + image-format handlers). The feature builds on
  # every target but we only wire a CI cell for Linux because the primitive
  # is platform-agnostic and one Linux cell is sufficient coverage.
  archive-c2pa:
    name: Archive (c2pa feature, Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: archive-c2pa-v1
      - name: Clippy (lvqr-archive, c2pa feature)
        run: cargo clippy -p lvqr-archive --features c2pa --all-targets -- -D warnings
      - name: Test (lvqr-archive, c2pa feature)
        run: cargo test -p lvqr-archive --features c2pa

  audit:
    name: Supply Chain (cargo-audit)
    runs-on: ubuntu-latest
    # Soft-fail during Tier 1 so the baseline can land without forcing
    # immediate advisory triage on every PR. Promote to required once
    # the RUSTSEC baseline is clean per tracking/AUDIT-READINESS-2026-04-13.md.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: audit-v1
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Stage advisory ignores
        # cargo-audit reads `~/.cargo/audit.toml`; project ignores live
        # in `audit.toml` at the repo root so they version-track with
        # Cargo.lock. See the dedicated `Supply-chain audit` workflow
        # for the same staging step.
        run: |
          mkdir -p "$HOME/.cargo"
          cp audit.toml "$HOME/.cargo/audit.toml"
      - name: Run cargo audit
        # Step failure is intentionally surfaced in the Checks tab so
        # new advisories are visible at a glance. The enclosing job
        # is marked continue-on-error so a failing step does not block
        # the PR during Tier 1; promote to required once the RUSTSEC
        # baseline is clean.
        run: cargo audit

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      # See `test` job above for why we run direct rm -rf rather than
      # `jlumbroso/free-disk-space@main`. The Docker build benefits
      # from the same headroom because the multi-stage build pulls a
      # Rust base + builds the workspace.
      - name: Free disk space
        run: |
          set -e
          echo "Before:"; df -h /
          for p in \
              /usr/local/lib/android \
              /usr/share/dotnet \
              /usr/share/swift \
              /opt/ghc /usr/local/.ghcup \
              /opt/hostedtoolcache/CodeQL \
              /opt/hostedtoolcache/PyPy \
              /opt/hostedtoolcache/Ruby \
              /opt/hostedtoolcache/go \
              /usr/local/share/powershell \
              /usr/local/share/chromium \
              /usr/local/share/boost \
              /opt/microsoft \
              /opt/google; do
            if [ -d "$p" ]; then
              echo "Removing $p"
              sudo rm -rf "$p" || true
            fi
          done
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          sudo swapoff -a 2>/dev/null || true
          sudo rm -f /mnt/swapfile /swapfile 2>/dev/null || true
          echo "After:"; df -h /
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f deploy/docker/Dockerfile .

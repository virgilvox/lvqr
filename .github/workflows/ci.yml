name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Format and Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # Linux is LVQR's production target -- this lane is the required
  # gate for every PR. All non-OS-specific code paths are covered
  # here, plus the Linux-only paths (io_uring, NVENC, VAAPI, QSV
  # transcode backends in their dedicated lanes below).
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      # Free ~30 GB of preinstalled tooling LVQR doesn't use so the
      # workspace cargo build + cargo test (with --jobs 2 cap) has
      # comfortable headroom for the integration test binary tree
      # and `lld` link tmp files. See the Docker Build job below for
      # the same cleanup template.
      - name: Free disk space
        run: |
          set -e
          echo "Before:"; df -h /
          for p in \
              /usr/local/lib/android \
              /usr/share/dotnet \
              /usr/share/swift \
              /opt/ghc /usr/local/.ghcup \
              /opt/hostedtoolcache/CodeQL \
              /opt/hostedtoolcache/PyPy \
              /opt/hostedtoolcache/Ruby \
              /opt/hostedtoolcache/go \
              /usr/local/share/powershell \
              /usr/local/share/chromium \
              /usr/local/share/boost \
              /opt/microsoft \
              /opt/google; do
            if [ -d "$p" ]; then
              echo "Removing $p"
              sudo rm -rf "$p" || true
            fi
          done
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          sudo swapoff -a 2>/dev/null || true
          sudo rm -f /mnt/swapfile /swapfile 2>/dev/null || true
          echo "After:"; df -h /
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Verify ffprobe is on PATH
        run: ffprobe -version | head -n 1
      - name: Build
        run: cargo build --workspace
      - name: Pre-test resource check
        run: |
          echo "--- disk ---"; df -h /
          echo "--- mem ---"; free -h
          echo "--- target/ size ---"; du -sh target/ 2>/dev/null || true
      - name: Test (lib + integration + doc)
        # `--jobs 2` caps parallel compilation/linking; cargo defaults
        # to `-j nproc` = 4 and four concurrent lld processes linking
        # full-workspace integration test binaries in debug mode have
        # historically crashed the runner with `collect2: fatal error:
        # ld terminated with signal 7 [Bus error]` via mmap'd tmp file
        # exhaustion. `--test-threads=2` is a separate cap on runtime
        # parallelism: many integration tests bind listening ports and
        # run real RTMP/HTTP/MoQ flows that contend on the loopback
        # stack when run too many at a time.
        run: cargo test --workspace --jobs 2 -- --test-threads=2

  # macOS coverage is informational, not a merge gate. Generic Rust
  # portability is real signal but the macos-latest GitHub-hosted
  # runner has been timing-fragile for several integration tests
  # (federation forward_track, scte35 RTMP push, slo ws latency
  # samples) that pass on Linux + local macOS dev. Those tests are
  # being hardened to active-wait patterns one-by-one as they
  # surface; this lane runs continue-on-error so the iteration does
  # not block PRs. macOS-specific code paths (VideoToolbox HW
  # encoder) ride the dedicated `videotoolbox-macos.yml` workflow,
  # which is required.
  test-macos:
    name: Test (macOS, informational)
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install ffmpeg
        run: brew install ffmpeg
      - name: Verify ffprobe is on PATH
        run: ffprobe -version | head -n 1
      - name: Build
        run: cargo build --workspace
      - name: Test (lib + integration + doc)
        run: cargo test --workspace --jobs 2 -- --test-threads=2

  # Tier 4 item 4.1 session A2: exercise the tokio-uring write path in
  # lvqr-archive's `io-uring` feature. Linux-only (tokio-uring only compiles
  # on `target_os = "linux"`) and isolated to its own job rather than a
  # matrix cell on `test` so macOS CI time does not grow.
  archive-io-uring:
    name: Archive (io-uring feature, Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: archive-io-uring-v1
      - name: Clippy (lvqr-archive, io-uring feature)
        run: cargo clippy -p lvqr-archive --features io-uring --all-targets -- -D warnings
      - name: Test (lvqr-archive, io-uring feature)
        run: cargo test -p lvqr-archive --features io-uring

  # Tier 4 item 4.3 session A: exercise the `provenance::sign_asset_bytes`
  # primitive through the `c2pa` feature. Separate job so macOS CI time does
  # not grow by ~2 minutes per build (c2pa-rs pulls a sizable transitive
  # closure for COSE + JUMBF + image-format handlers). The feature builds on
  # every target but we only wire a CI cell for Linux because the primitive
  # is platform-agnostic and one Linux cell is sufficient coverage.
  archive-c2pa:
    name: Archive (c2pa feature, Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: archive-c2pa-v1
      - name: Clippy (lvqr-archive, c2pa feature)
        run: cargo clippy -p lvqr-archive --features c2pa --all-targets -- -D warnings
      - name: Test (lvqr-archive, c2pa feature)
        run: cargo test -p lvqr-archive --features c2pa

  audit:
    name: Supply Chain (cargo-audit)
    runs-on: ubuntu-latest
    # Soft-fail during Tier 1 so the baseline can land without forcing
    # immediate advisory triage on every PR. Promote to required once
    # the RUSTSEC baseline is clean per tracking/AUDIT-READINESS-2026-04-13.md.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: audit-v1
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Stage advisory ignores
        # cargo-audit reads `~/.cargo/audit.toml`; project ignores live
        # in `audit.toml` at the repo root so they version-track with
        # Cargo.lock. See the dedicated `Supply-chain audit` workflow
        # for the same staging step.
        run: |
          mkdir -p "$HOME/.cargo"
          cp audit.toml "$HOME/.cargo/audit.toml"
      - name: Run cargo audit
        # Step failure is intentionally surfaced in the Checks tab so
        # new advisories are visible at a glance. The enclosing job
        # is marked continue-on-error so a failing step does not block
        # the PR during Tier 1; promote to required once the RUSTSEC
        # baseline is clean.
        run: cargo audit

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      # See `test` job above for why we run direct rm -rf rather than
      # `jlumbroso/free-disk-space@main`. The Docker build benefits
      # from the same headroom because the multi-stage build pulls a
      # Rust base + builds the workspace.
      - name: Free disk space
        run: |
          set -e
          echo "Before:"; df -h /
          for p in \
              /usr/local/lib/android \
              /usr/share/dotnet \
              /usr/share/swift \
              /opt/ghc /usr/local/.ghcup \
              /opt/hostedtoolcache/CodeQL \
              /opt/hostedtoolcache/PyPy \
              /opt/hostedtoolcache/Ruby \
              /opt/hostedtoolcache/go \
              /usr/local/share/powershell \
              /usr/local/share/chromium \
              /usr/local/share/boost \
              /opt/microsoft \
              /opt/google; do
            if [ -d "$p" ]; then
              echo "Removing $p"
              sudo rm -rf "$p" || true
            fi
          done
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          sudo swapoff -a 2>/dev/null || true
          sudo rm -f /mnt/swapfile /swapfile 2>/dev/null || true
          echo "After:"; df -h /
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f deploy/docker/Dockerfile .

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Format and Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # ffmpeg is required so the conformance test helper in
      # lvqr-test-utils (ffprobe_bytes) validates generated fMP4 output
      # against a real external validator instead of soft-skipping.
      - name: Install ffmpeg (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install ffmpeg (macos)
        if: runner.os == 'macOS'
        run: brew install ffmpeg
      - name: Verify ffprobe is on PATH
        run: ffprobe -version | head -n 1
      - name: Build
        run: cargo build --workspace
      - name: Test (lib + integration + doc)
        run: cargo test --workspace

  test-legacy-fmp4-path:
    name: Test (legacy hand-rolled fMP4 writer)
    runs-on: ubuntu-latest
    # Matrix companion to the `test` job above. As of session 12.2 the
    # `cmaf-writer` feature is default-on (see
    # `crates/lvqr-ingest/Cargo.toml`), so the main `test` job
    # already exercises the `lvqr_cmaf::build_moof_mdat` write path
    # end-to-end. This job keeps the legacy in-crate hand-rolled
    # `remux::fmp4::video_segment` path honest during the final
    # transition cycle by disabling default features on `lvqr-cli`
    # so `cmaf-writer` switches off and the bridge dispatches to the
    # hand-rolled writer. Once the hand-rolled path is deleted in a
    # later session this job goes away with it.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: legacy-fmp4-v1
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Verify ffprobe is on PATH
        run: ffprobe -version | head -n 1
      - name: Build (legacy fMP4 path)
        run: cargo build -p lvqr-cli --no-default-features --features rtmp,quinn-transport
      - name: Test lvqr-ingest (legacy fMP4 path)
        run: cargo test -p lvqr-ingest --no-default-features --features rtmp,quinn-transport
      - name: Test lvqr-cli (legacy fMP4 path, RTMP -> WS / HLS E2E)
        run: cargo test -p lvqr-cli --no-default-features --features rtmp,quinn-transport

  audit:
    name: Supply Chain (cargo-audit)
    runs-on: ubuntu-latest
    # Soft-fail during Tier 1 so the baseline can land without forcing
    # immediate advisory triage on every PR. Promote to required once
    # the RUSTSEC baseline is clean per tracking/AUDIT-READINESS-2026-04-13.md.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: audit-v1
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        # Step failure is intentionally surfaced in the Checks tab so
        # new advisories are visible at a glance. The enclosing job
        # is marked continue-on-error so a failing step does not block
        # the PR during Tier 1; promote to required once the RUSTSEC
        # baseline is clean.
        run: cargo audit

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: cargo install wasm-pack
      - name: Build WASM
        run: wasm-pack build crates/lvqr-wasm --target web

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f deploy/docker/Dockerfile .

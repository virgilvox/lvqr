name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Format and Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # ffmpeg is required so the conformance test helper in
      # lvqr-test-utils (ffprobe_bytes) validates generated fMP4 output
      # against a real external validator instead of soft-skipping.
      - name: Install ffmpeg (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install ffmpeg (macos)
        if: runner.os == 'macOS'
        run: brew install ffmpeg
      - name: Verify ffprobe is on PATH
        run: ffprobe -version | head -n 1
      - name: Build
        run: cargo build --workspace
      - name: Test (lib + integration + doc)
        run: cargo test --workspace

  audit:
    name: Supply Chain (cargo-audit)
    runs-on: ubuntu-latest
    # Soft-fail during Tier 1 so the baseline can land without forcing
    # immediate advisory triage on every PR. Promote to required once
    # the RUSTSEC baseline is clean per tracking/AUDIT-READINESS-2026-04-13.md.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: audit-v1
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        # Step failure is intentionally surfaced in the Checks tab so
        # new advisories are visible at a glance. The enclosing job
        # is marked continue-on-error so a failing step does not block
        # the PR during Tier 1; promote to required once the RUSTSEC
        # baseline is clean.
        run: cargo audit

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f deploy/docker/Dockerfile .

name: Fuzz

# cargo-fuzz targets for the LVQR parser crates:
#
#   - crates/lvqr-ingest/fuzz: RTMP/FLV parsers.
#   - crates/lvqr-codec/fuzz: HEVC SPS + AAC AudioSpecificConfig
#     parsers plus the shared BitReader exp-Golomb decoder.
#
# Two cadences:
#
#   - Every PR runs each target for 60 seconds. This is educational
#     during Tier 1 per tests/CONTRACT.md: the job is set to
#     continue-on-error so a crash does not block the PR, but the
#     run is surfaced in the Checks tab and any crash corpus is
#     uploaded as an artifact for investigation.
#
#   - Nightly cron runs each target for 15 minutes. Same soft-fail
#     rule; findings get triaged out of band and land in
#     crates/lvqr-conformance/fixtures/edge-cases/<target>/.
#
# Both cadences run on nightly rustc because libfuzzer-sys requires
# sanitizer instrumentation that stable does not ship.

on:
  pull_request:
    branches: [main]
    paths:
      - "crates/lvqr-ingest/src/**"
      - "crates/lvqr-ingest/fuzz/**"
      - "crates/lvqr-codec/src/**"
      - "crates/lvqr-codec/fuzz/**"
      - ".github/workflows/fuzz.yml"
  schedule:
    # 07:00 UTC daily. Low-contention window for Linux runners.
    - cron: "0 7 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fuzz:
    name: Fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    # Soft-fail throughout Tier 1 per tests/CONTRACT.md. Promote to a
    # hard-fail once Tier 2 lands and the fuzz corpora are stable.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: parse_video_tag
            fuzz_dir: crates/lvqr-ingest/fuzz
          - target: parse_audio_tag
            fuzz_dir: crates/lvqr-ingest/fuzz
          - target: parse_hevc_sps
            fuzz_dir: crates/lvqr-codec/fuzz
          - target: parse_aac_asc
            fuzz_dir: crates/lvqr-codec/fuzz
          - target: read_ue_v
            fuzz_dir: crates/lvqr-codec/fuzz
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry and fuzz build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.fuzz_dir }} -> target
          # Separate key namespace so the nightly fuzz cache does not
          # collide with the stable workspace cache from ci.yml.
          prefix-key: fuzz-v1

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Determine run duration
        id: duration
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "seconds=900" >> "$GITHUB_OUTPUT"
          else
            echo "seconds=60" >> "$GITHUB_OUTPUT"
          fi

      - name: Run ${{ matrix.target }} for ${{ steps.duration.outputs.seconds }}s
        working-directory: ${{ matrix.fuzz_dir }}
        run: |
          cargo +nightly fuzz run ${{ matrix.target }} -- \
            -max_total_time=${{ steps.duration.outputs.seconds }} \
            -print_final_stats=1

      - name: Upload crash artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ matrix.target }}-${{ github.run_id }}
          path: |
            ${{ matrix.fuzz_dir }}/artifacts/${{ matrix.target }}/**
            ${{ matrix.fuzz_dir }}/corpus/${{ matrix.target }}/**
          if-no-files-found: ignore
          retention-days: 30

name: Mesh E2E

# Playwright end-to-end suites under bindings/js/tests/e2e/. Two
# Playwright projects share this workflow because they share the
# bindings/js npm workspace, the same `playwright.config.ts`
# (multi-project + multi-webServer shape since session 153), and
# the same `lvqr serve` debug binary:
#
#   * `mesh` (sessions 116 / 142) -- two- and three-peer DataChannel
#     relay E2E. Boots `lvqr serve --mesh-enabled` on port 18088.
#   * `dvr-player` (session 153) -- mounts the @lvqr/dvr-player web
#     component against a live HLS endpoint with --archive-dir +
#     --hls-dvr-window enabled, asserting custom-element
#     registration, shadow DOM, attribute reflection, programmatic
#     API + event flow, keyboard scrub, pointer drag, and hover
#     preview overlay. Boots a second `lvqr serve` on port 18089.
#     Session 154 added the SCTE-35 ad-marker render path; session
#     155 closes its three test-coverage follow-ups by exercising
#     a live ffmpeg publish + LIVE-pill assertion + a synthetic
#     `scte35-rtmp-push` bin -> onCuePoint -> DATERANGE -> marker
#     render flow. Both live-RTMP tests are gated on
#     `LVQR_LIVE_RTMP_TESTS=1`; this workflow installs ffmpeg + sets
#     the env var so they run on every CI push.
#
# Triggers: changes to either suite's spec or source under test, the
# shared playwright config / package metadata, the underlying CLI /
# signal / mesh / archive / HLS crates that the tests exercise, or
# this workflow file. Distinct from .github/workflows/e2e.yml (which
# covers the Tier 1 test-app shell under tests/e2e/).
#
# Soft-fail for now via continue-on-error. WebRTC + browser-side
# media interactions have environment-sensitive edge cases (IPv6,
# loopback routing, nested virtualization, GPU-less Chromium MSE
# corners) that are worth flagging rather than blocking PRs on
# during the first few weeks of each suite's life. Promote to
# required once green-run streaks are established.

on:
  pull_request:
    branches: [main]
    paths:
      - "bindings/js/packages/**"
      - "bindings/js/tests/e2e/**"
      - "bindings/js/tests/helpers/**"
      - "bindings/js/playwright.config.ts"
      - "bindings/js/package.json"
      - "bindings/js/package-lock.json"
      - "crates/lvqr-signal/**"
      - "crates/lvqr-mesh/**"
      - "crates/lvqr-archive/**"
      - "crates/lvqr-hls/**"
      - "crates/lvqr-cli/src/main.rs"
      - "crates/lvqr-cli/src/lib.rs"
      - "crates/lvqr-test-utils/**"
      - "vendor/rml_rtmp/**"
      - ".github/workflows/mesh-e2e.yml"
  push:
    branches: [main]
    paths:
      - "bindings/js/packages/**"
      - "bindings/js/tests/e2e/**"
      - "bindings/js/tests/helpers/**"
      - "bindings/js/playwright.config.ts"
      - "bindings/js/package.json"
      - "bindings/js/package-lock.json"
      - "crates/lvqr-signal/**"
      - "crates/lvqr-mesh/**"
      - "crates/lvqr-archive/**"
      - "crates/lvqr-hls/**"
      - "crates/lvqr-cli/src/main.rs"
      - "crates/lvqr-cli/src/lib.rs"
      - "crates/lvqr-test-utils/**"
      - "vendor/rml_rtmp/**"
      - ".github/workflows/mesh-e2e.yml"
  workflow_dispatch:

jobs:
  mesh-e2e:
    name: Playwright (chromium)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # Session 155: install ffmpeg for the live-RTMP Playwright
      # tests in `bindings/js/tests/e2e/dvr-player/markers.spec.ts`.
      # The first live test drives an ffmpeg-publisher via the
      # `helpers/rtmp-push.ts` wrapper; the second drives the new
      # `scte35-rtmp-push` Rust bin (which does not need ffmpeg but
      # the broader test depends on the live-RTMP env gate). Cached
      # apt step costs ~30 s on a cold runner.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # Rust side: build the lvqr binary that Playwright's webServer
      # will spawn, plus the lvqr-test-utils bins (session 155 adds
      # `scte35-rtmp-push` for the gated marker e2e). The binary
      # paths are resolved relative to bindings/js/playwright.config.ts
      # as ../../target/debug/<bin>.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: mesh-e2e-v1
      - name: Build lvqr-cli + lvqr-test-utils bins (debug)
        run: cargo build -p lvqr-cli -p lvqr-test-utils --bins

      # Rebuild every workspace dist/ so the suites pull the latest
      # source: the mesh suite's `addInitScript` injects
      # @lvqr/core's compiled MeshPeer; the dvr-player suite's
      # importmap-routed page.route handlers serve the compiled
      # @lvqr/dvr-player bundle.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bindings/js/package-lock.json

      - name: Install bindings/js workspace dependencies
        working-directory: bindings/js
        run: npm install --no-audit --no-fund

      - name: Build all bindings/js workspace dist/
        working-directory: bindings/js
        run: npm run build

      - name: Install Chromium (with system deps)
        working-directory: bindings/js
        run: npx playwright install --with-deps chromium

      - name: Run mesh Playwright tests
        working-directory: bindings/js
        env:
          # Session 155: opt the live-RTMP marker tests in
          # `tests/e2e/dvr-player/markers.spec.ts` into the run.
          # The two gated tests skip when this env var is unset
          # (so local `npx playwright test` stays deterministic);
          # CI installs ffmpeg + the scte35-rtmp-push bin above so
          # both live tests exercise the full publish + render
          # pipeline on every push.
          LVQR_LIVE_RTMP_TESTS: "1"
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mesh-playwright-report-${{ github.run_id }}
          path: bindings/js/playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mesh-playwright-traces-${{ github.run_id }}
          path: bindings/js/test-results
          if-no-files-found: ignore
          retention-days: 14

# cargo-audit configuration -- consumed by `cargo audit` in
# `.github/workflows/audit.yml` and locally before each release.
#
# This file lists advisories the project intentionally tolerates,
# each with a rationale and (where applicable) a tracking note for
# the future session that will close it. The default policy is
# zero ignores; every entry below is a documented exception.
#
# Closing-out checklist for an ignore:
# 1. The named upstream upgrade ships in the workspace.
# 2. The reason line below stops applying.
# 3. Remove the ignore. Re-run `cargo audit --deny warnings`.

[advisories]
ignore = [
    # rsa Marvin attack: no fixed upgrade exists upstream. LVQR
    # pulls rsa transitively through c2pa for manifest *signing*
    # (Tier 4 item 4.3). The Marvin sidechannel requires a chosen-
    # ciphertext oracle against an in-process RSA *decryption* path
    # we do not exercise. Revisit if upstream rsa ships a fix.
    "RUSTSEC-2023-0071",

    # NOTE: 16 wasmtime advisories (RUSTSEC-2025-0046, 2025-0118,
    # 2026-{0020,0021,0085..0089,0091..0096} including 2x CVSS-9
    # sandbox-escape entries) were closed in session 150 by upgrading
    # wasmtime from v25 to v43 in `Cargo.toml`. The lvqr-wasm crate
    # uses only the core `Engine`/`Module`/`Store`/`Instance`/
    # `TypedFunc` API surface, which is stable across the v25..v43
    # range; the upgrade required only two `Module::new` callsites
    # converting `wasmtime::Error` to `anyhow::Error` via
    # `anyhow::anyhow!` (wasmtime v43 dropped `std::error::Error`
    # from its top-level error type, breaking anyhow's blanket
    # `From` impl). The 16 ignores that previously lived here are
    # gone; future wasmtime advisories should drive a fresh upgrade
    # rather than be ignored.

    # Unmaintained transitive dependencies. Each is brought in by a
    # crate the project does not control directly; replacing them
    # is gated on the upstream ecosystem migrating off.
    "RUSTSEC-2024-0370", # proc-macro-error -- unmaintained; transitive
    "RUSTSEC-2024-0436", # paste -- unmaintained; transitive
    "RUSTSEC-2025-0134", # rustls-pemfile -- unmaintained; superseded by rustls-pki-types upstream

    # Soundness advisories on transitives. Neither is reachable from
    # LVQR's call sites: lru's IterMut is not used through any LVQR
    # API, and rand's custom-logger unsoundness requires a `log`
    # facade configuration LVQR does not run. Tracked alongside the
    # next routine dep-bump session.
    "RUSTSEC-2026-0002", # lru -- IterMut violates Stacked Borrows
    "RUSTSEC-2026-0097", # rand -- unsound with a custom logger using `rand::rng()`
]

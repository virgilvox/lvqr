# Minimal coturn configuration for LVQR mesh deployments.
#
# Covers the symmetric-NAT case: peers behind NAT that cannot
# establish a direct WebRTC DataChannel candidate-pair will relay
# their media through this TURN server. STUN-only deployments do
# not need coturn at all; this file is for the TURN path.
#
# After editing realm + user + min/max-port to match your
# deployment, start the server with:
#   sudo coturn -c /etc/coturn/coturn.conf
#
# Wire LVQR to it:
#   lvqr serve --mesh-enabled --mesh-ice-servers '[
#     {"urls":["stun:stun.l.google.com:19302"]},
#     {"urls":["turn:turn.example.com:3478"],"username":"lvqr-mesh","credential":"<password>"}
#   ]'
#
# Sanity check:
#   turnutils_uclient -u lvqr-mesh -w <password> turn.example.com

# UDP listening port. Standard TURN; no reason to change.
listening-port=3478

# Public-facing realm. Must match the issuer your clients expect.
# Change this to your domain before going to production.
realm=lvqr.example.com

# Long-term credential mechanism. coturn ships with several auth
# modes; long-term creds is the simplest and matches what the
# `--mesh-ice-servers` JSON carries (username + credential).
lt-cred-mech

# Static user (CHANGE BOTH BEFORE PRODUCTION). Format is
# user=<name>:<plaintext-or-keyed-password>. Use `turnadmin -k`
# to derive a keyed password if you do not want plaintext on
# disk.
user=lvqr-mesh:CHANGE_ME

# Relay port range. coturn allocates a UDP port per active relay
# session within this range. Open the corresponding firewall
# rules.
min-port=49160
max-port=49200

# Disable TCP/TLS by default. Most LVQR mesh deployments only
# need the UDP path. Enable these explicitly when your network
# blocks UDP.
no-tcp
no-tls

# Quotas. Tune to your fleet; defaults below are a sane
# starting point for a small deployment.
total-quota=100
user-quota=12
max-bps=4000000

# Add fingerprints to TURN messages. Required by RFC; coturn
# ships this off by default for legacy compat. Always set on
# new deployments.
fingerprint

# Where to log. Comment out if you ship logs to journalctl /
# stdout via systemd.
# log-file=/var/log/coturn/coturn.log
# simple-log

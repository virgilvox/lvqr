[package]
name = "rml_rtmp"
description = "Rust library for handling aspects of the RTMP protocol. Vendored fork patched for SCTE-35 onCuePoint passthrough (LVQR session 152)."
version = "0.8.0"
authors = ["Matthew Shapiro <me@mshapiro.net>"]
repository = "https://github.com/KallDrexx/rust-media-libs"
license = "MIT"
readme = "Readme.md"
categories = ["multimedia", "multimedia::video", "multimedia::audio"]
keywords = ["rtmp", "video", "streaming"]
# Upstream rml_rtmp v0.8.0 has no `edition` field, which Cargo treats
# as edition 2015. The source uses 2015-era module resolution
# (`use messages::...` style absolute paths) so the vendor copy stays
# on 2015 too. A future port to a newer edition would touch every
# module path.
publish = false

[dependencies]
rml_amf0 = "0.3.0"
byteorder = "1.3"
bytes = "1"
rand = "0.8"
hmac = "0.10"
sha2 = "0.9"
thiserror = "1.0"
